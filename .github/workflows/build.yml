name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git python3-dev python3-pip ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev openjdk-17-jdk unzip
          python -m pip install --upgrade pip
          pip install buildozer cython
      
      - name: Set JAVA_HOME
        run: echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
      
      - name: Build APK with Buildozer
        working-directory: qrscan_app
        run: buildozer -v android debug
      
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: adekharianto-debug-apk
          path: qrscan_app/bin/*.apk
          retention-days: 30
      
      - name: Show build log on failure
        if: failure()
        run: |
          echo "Build failed - checking logs..."
          if [ -f qrscan_app/.buildozer/logs/buildozer.log ]; then tail -100 qrscan_app/.buildozer/logs/buildozer.log; fi
